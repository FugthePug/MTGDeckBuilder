<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Commander Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #121212;
      color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background: #1e1e1e;
      padding: 2rem;
      border-radius: 12px;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    p {
      line-height: 1.5;
    }

    label {
      display: block;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.9rem;
      border: none;
      border-radius: 6px;
      background: #4caf50;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #45a049;
    }

    .error {
      color: #ff6b6b;
      margin-top: 1rem;
    }

    .result {
      margin-top: 2rem;
      text-align: center;
    }

    .result img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 1rem;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .loading {
      margin-top: 1rem;
      text-align: center;
      color: #cccccc;
    }

    .examples {
      margin-top: 0.5rem;
      color: #bbbbbb;
      font-size: 0.9rem;
    }

    .color-selector {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1rem;
      margin-bottom: 1rem;
    }

    .color-btn {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: 3px solid transparent;
      font-weight: bold;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s ease, border 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
      padding: 0;
      display: grid;
      place-items: center;
      color: white;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.75);
    }

    .color-btn:hover {
      transform: scale(1.08);
    }

    .color-btn img.color-icon {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.95;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .color-btn:hover img.color-icon {
      transform: scale(1.05);
      opacity: 1;
    }

    .color-btn .color-label {
      position: relative;
      z-index: 1;
      display: block;
    }

    .color-btn.active {
      border: 3px solid #ffffff;
      box-shadow: 0 0 12px rgba(255,255,255,0.7);
    }

    .white {
      background: #f5f1d7;
      color: #000;
    }

    .blue {
      background: #0e68ab;
      color: white;
    }

    .black {
      background: #150b00;
      color: white;
    }

    .red {
      background: #d3202a;
      color: white;
    }

    .green {
      background: #00733e;
      color: white;
    }

    .colorless {
      background: #b0b0b0;
      color: black;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Random Commander Generator</h1>

    <p>
      Select your commander's color identity!
    </p>

    <div class="color-selector">
      <button class="color-btn white" data-color="w">
        <img class="color-icon" src="colorIcons/white.jpg" alt="White icon">
      </button>
      <button class="color-btn blue" data-color="u">
        <img class="color-icon" src="colorIcons/Blue.jpg" alt="Blue icon">
      </button>
      <button class="color-btn black" data-color="b">
        <img class="color-icon" src="colorIcons/Black.jpg" alt="Black icon">
      </button>
      <button class="color-btn red" data-color="r">
        <img class="color-icon" src="colorIcons/Red.png" alt="Red icon">
      </button>
      <button class="color-btn green" data-color="g">
        <img class="color-icon" src="colorIcons/Green.jpg" alt="Green icon">
      </button>
      <button class="color-btn colorless" data-color="c">
        <img class="color-icon" src="colorIcons/Colorless.png" alt="Colorless icon">
      </button>
    </div>

    <button id="generateBtn">Generate Random Commander</button>

    <div id="error" class="error"></div>
    <div id="loading" class="loading"></div>

    <div id="result" class="result"></div>
  </div>

  <script>
    const generateBtn = document.getElementById('generateBtn');
    const resultDiv = document.getElementById('result');
    const errorDiv = document.getElementById('error');
    const loadingDiv = document.getElementById('loading');
    const colorButtons = document.querySelectorAll('.color-btn');

    let selectedColors = [];

    colorButtons.forEach(button => {
      button.addEventListener('click', () => {
        const color = button.dataset.color;

        // Handle colorless special rules
        if (color === 'c') {
          selectedColors = ['c'];

          colorButtons.forEach(btn => {
            btn.classList.remove('active');
          });

          button.classList.add('active');
          return;
        }

        // Deselect colorless when selecting colors
        selectedColors = selectedColors.filter(c => c !== 'c');

        const colorlessButton = document.querySelector('[data-color="c"]');
        colorlessButton.classList.remove('active');

        // Toggle selected colors
        if (selectedColors.includes(color)) {
          selectedColors = selectedColors.filter(c => c !== color);
          button.classList.remove('active');
        } else {
          selectedColors.push(color);
          button.classList.add('active');
        }
      });
    });

    generateBtn.addEventListener('click', async () => {
      const userColors = selectedColors.sort().join('');

      resultDiv.innerHTML = '';
      errorDiv.textContent = '';
      loadingDiv.textContent = '';

      loadingDiv.textContent = 'Fetching random commander...';

      try {
        const requestURL =
          `https://api.scryfall.com/cards/random?q=is%3Acommander+id%3D${userColors}`;

        const response = await fetch(requestURL);

        if (!response.ok) {
          throw new Error('Failed to fetch commander data.');
        }

        const commander = await response.json();

        loadingDiv.textContent = '';

        const imageUrl = commander.image_uris
          ? commander.image_uris.normal
          : commander.card_faces?.[0]?.image_uris?.normal;

        resultDiv.innerHTML = `
          <h2>${commander.name}</h2>
          <p><strong>Mana Cost:</strong> ${commander.mana_cost || 'N/A'}</p>
          <p><strong>Type:</strong> ${commander.type_line}</p>
          <p><strong>Oracle Text:</strong></p>
          <p>${commander.oracle_text || 'No text available.'}</p>
          ${imageUrl ? `<img src="${imageUrl}" alt="${commander.name}">` : ''}
        `;
      } catch (error) {
        loadingDiv.textContent = '';
        errorDiv.textContent = `Error: ${error.message}`;
      }
    });
  </script>
</body>
</html>
