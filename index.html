<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Commander Generator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <h1>Random Commander Generator</h1>

    <p>
      Select your commander's color identity!
    </p>

    <div class="color-selector">
      <button class="color-btn white" data-color="w">
        <img class="color-icon" src="colorIcons/white.jpg" alt="White icon">
      </button>
      <button class="color-btn blue" data-color="u">
        <img class="color-icon" src="colorIcons/Blue.jpg" alt="Blue icon">
      </button>
      <button class="color-btn black" data-color="b">
        <img class="color-icon" src="colorIcons/Black.jpg" alt="Black icon">
      </button>
      <button class="color-btn red" data-color="r">
        <img class="color-icon" src="colorIcons/Red.png" alt="Red icon">
      </button>
      <button class="color-btn green" data-color="g">
        <img class="color-icon" src="colorIcons/Green.jpg" alt="Green icon">
      </button>
      <button class="color-btn colorless" data-color="c">
        <img class="color-icon" src="colorIcons/Colorless.png" alt="Colorless icon">
      </button>
    </div>

    <button id="generateBtn" disabled>Generate Random Commander</button>

    <div id="error" class="error"></div>
    <div id="loading" class="loading"></div>

    <div id="result" class="result"></div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
